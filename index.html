<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>譜面大会成績管理シート Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --excel-green: #217346;
            --excel-light: #e6eee9;
            --border-color: #bbb;
            --header-bg: #f3f3f3;
            --text-color: #333;
            --gold: #d4af37;
            --silver: #a9a9a9;
            --bronze: #b87333;
        }

        body { font-family: "Segoe UI", "Meiryo", sans-serif; background-color: #ddd; color: var(--text-color); margin: 0; padding: 0; }

        nav { background: var(--excel-green); display: flex; padding: 0 10px; position: sticky; top: 0; z-index: 100; }
        .tab-btn { 
            background: none; border: none; color: white; padding: 12px 15px; cursor: pointer; 
            font-size: 14px; font-weight: bold; border-bottom: 4px solid transparent;
            flex: 1; text-align: center; white-space: nowrap;
        }
        .tab-btn.active { border-bottom: 4px solid #fff; background: rgba(255,255,255,0.2); }

        .container { 
            background: white; 
            margin: 10px auto; 
            padding: 15px; 
            min-height: 85vh; 
            max-width: 1150px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }
        
        @media screen and (max-height: 500px) and (orientation: landscape) {
            #table, #dashboard { zoom: 0.6; } 
            .container { margin: 5px auto; padding: 10px; max-width: 100%; }
            nav { zoom: 0.8; }
        }

        .view { display: none; }
        .view.active { display: block; }

        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid var(--border-color); }
        table { border-collapse: collapse; width: 100%; min-width: 950px; background: white; table-layout: fixed; }
        th, td { border: 1px solid var(--border-color); padding: 4px 8px; font-size: 13px; text-align: left; overflow: hidden; }
        th { background: var(--header-bg); font-weight: normal; color: #666; text-align: center; }

        .col-drag { width: 30px; }
        .col-no { width: 40px; }
        .col-comp { width: 180px; }
        .col-song { width: 320px; }
        .col-rank { width: 70px; }
        .col-score { width: 85px; }
        .col-rate { width: 95px; }

        .entry-table input[type="text"], .entry-table input[type="number"] { 
            width: 100%; border: none; outline: none; padding: 6px 4px; 
            background: transparent; font-size: 16px;
            box-sizing: border-box;
        }
        .entry-table tr:focus-within { background-color: var(--excel-light); }
        
        .sortable-ghost { opacity: 0.4; background-color: var(--excel-light); }
        .drag-handle { cursor: grab; color: #999; text-align: center; font-size: 18px; user-select: none; }
        .drag-handle:active { cursor: grabbing; }

        .add-btn { background: var(--excel-green); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 2px; margin-top: 15px; width: 100%; font-weight: bold; font-size: 15px; }

        .rank-gold { color: var(--gold) !important; font-weight: bold; text-shadow: 0 0 8px rgba(212, 175, 55, 0.6); }
        .rank-silver { color: var(--silver) !important; font-weight: bold; text-shadow: 0 0 8px rgba(169, 169, 169, 0.6); }
        .rank-bronze { color: var(--bronze) !important; font-weight: bold; text-shadow: 0 0 8px rgba(184, 115, 51, 0.6); }

        .rate-cell-content { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; height: 100%; }
        .best-label { font-size: 9px; font-weight: bold; color: #555; line-height: 1; margin-bottom: 2px; text-transform: uppercase; }
        .rate-value { font-size: 14px; font-weight: bold; }

        .dashboard-container { display: flex; flex-direction: column; gap: 1px; background: var(--border-color); border: 2px solid var(--border-color); margin-bottom: 25px; border-radius: 4px; overflow: hidden; }
        .dash-row-top { display: flex; background: white; }
        .total-rate-box { flex: 1.5; padding: 20px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, #fffcf0 0%, #fff4cc 100%); }
        .meta-box { flex: 1; display: flex; flex-direction: column; background: #fcfcfc; }
        .meta-item { flex: 1; padding: 10px 20px; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid var(--border-color); }
        .meta-item:last-child { border-bottom: none; }
        .dash-row-bottom { display: flex; background: white; border-top: 2px solid var(--border-color); }
        .bottom-item { flex: 1; padding: 15px 20px; border-right: 1px solid var(--border-color); background: #fdfdfd; text-align: center; }
        .bottom-item:last-child { border-right: none; }
        .bottom-item:nth-child(1) { border-top: 3px solid #3b82f6; } 
        .bottom-item:nth-child(2) { border-top: 3px solid #10b981; } 
        .bottom-item:nth-child(3) { border-top: 3px solid #f59e0b; } 

        .stat-label { font-size: 12px; color: #64748b; margin-bottom: 4px; font-weight: bold; }
        .stat-value { font-size: 20px; font-weight: bold; color: #1e293b; }
        .stat-value.large { font-size: 38px; color: #b45309; text-shadow: 1px 1px 0px #fff; }

        .score-display { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding: 2px 0; }
        .score-main { font-weight: bold; font-size: 14px; line-height: 1.4; } 
        .score-avg { font-size: 10px; color: #999; margin-top: -1px; line-height: 1; } 

        .top10-song { font-size: 11px !important; word-break: break-all; padding: 8px !important; color: #475569; }
        .top10-stats { font-size: 11px !important; color: #64748b; text-align: center; }
        .top10-rate { font-size: 18px !important; font-weight: 800; text-align: right; padding: 8px !important; font-family: 'Consolas', monospace; }

        .winner-row { background-color: #ffffff !important; }
        .excluded-row { background-color: #f0f0f0 !important; color: #888; }

        .chart-container { margin-top: 20px; padding: 10px; border: 1px solid var(--border-color); background: white; border-radius: 4px; height: 220px; position: relative; }
        .chart-controls { margin-bottom: 5px; display: flex; gap: 5px; align-items: center; }
        .chart-btn { font-size: 11px; padding: 3px 8px; cursor: pointer; border: 1px solid var(--border-color); background: #eee; }
        .chart-btn.active { background: var(--excel-green); color: white; border-color: var(--excel-green); }

        /* 追加コントロール */
        .table-header-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .copy-btn { color: #217346; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: bold; }

        @media (max-width: 480px) {
            .container { margin: 5px; padding: 8px; }
            .stat-value.large { font-size: 28px; }
            .chart-container { height: 180px; }
        }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="switchTab('entry')">記入欄</button>
    <button class="tab-btn" onclick="switchTab('table')">成績表</button>
    <button class="tab-btn" onclick="switchTab('dashboard')">ダッシュボード</button>
</nav>

<div class="container">
    <div id="entry" class="view active">
        <h3 style="margin:0 0 10px 0; font-size: 16px;">大会成績を記入（自動保存）</h3>
        <div class="table-wrapper">
            <table class="entry-table">
                <thead>
                    <tr>
                        <th class="col-drag"></th>
                        <th class="col-no">No.</th>
                        <th class="col-comp">大会名</th>
                        <th class="col-song">曲名</th>
                        <th class="col-rank">順位</th>
                        <th class="col-rank">譜面数</th>
                        <th class="col-score">点数</th>
                        <th class="col-score">平均点</th>
                        <th style="width: 80px;">除外 / 複 / 削</th>
                    </tr>
                </thead>
                <tbody id="entryBody"></tbody>
            </table>
        </div>
        <button class="add-btn" onclick="addNewRow()">＋ 新しい行を追加</button>
    </div>

    <div id="table" class="view">
        <div class="table-header-controls">
            <h3 style="margin:0; font-size: 16px;">成績一覧表</h3>
            <label style="font-size: 12px; cursor: pointer; background: #eee; padding: 4px 8px; border-radius: 4px;">
                <input type="checkbox" id="showExcludedCheck" checked onchange="render()"> 除外譜面を表示する
            </label>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-no">No.</th>
                        <th class="col-comp">大会名</th>
                        <th class="col-song">曲名</th>
                        <th class="col-rank">順位/数</th>
                        <th class="col-score">点数</th>
                        <th class="col-score">上位率</th>
                        <th class="col-rate">レート</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>

    <div id="dashboard" class="view">
        <h3 style="margin:0 0 10px 0; font-size: 16px;">統計分析</h3>
        
        <div class="dashboard-container">
            <div class="dash-row-top">
                <div class="total-rate-box">
                    <div class="stat-label">総合レート</div>
                    <div id="dTotalRate" class="stat-value large">0.00</div>
                </div>
                <div class="meta-box">
                    <div class="meta-item">
                        <div class="stat-label">参加譜面数</div>
                        <div id="dCount" class="stat-value">0</div>
                    </div>
                    <div class="meta-item">
                        <div class="stat-label">平均順位</div>
                        <div id="dAvgRank" class="stat-value">0.0</div>
                    </div>
                </div>
            </div>
            <div class="dash-row-bottom">
                <div class="bottom-item">
                    <div class="stat-label">平均点超え率</div>
                    <div id="dAvgOver" class="stat-value">0%</div>
                </div>
                <div class="bottom-item">
                    <div class="stat-label">Top 10率</div>
                    <div id="dTop10Rate" class="stat-value">0%</div>
                </div>
                <div class="bottom-item">
                    <div class="stat-label">Top 3率</div>
                    <div id="dTop3Rate" class="stat-value">0%</div>
                </div>
            </div>
        </div>

        <div class="ranking-container">
            <h4 style="font-size:14px; margin-bottom:10px; color: var(--excel-green); border-bottom: 2px solid var(--excel-green); padding-bottom: 4px;">単曲レートランキング Top 10</h4>
            <div class="table-wrapper" style="border: 1px solid var(--border-color);">
                <table style="min-width: 100%;">
                    <thead>
                        <tr><th style="width:50px;">Rank</th><th>曲名</th><th style="width:80px;">順位/数</th><th style="width:110px;">単曲レート</th></tr>
                    </thead>
                    <tbody id="top10Body"></tbody>
                </table>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-controls">
                <span class="stat-label">表示件数:</span>
                <button class="chart-btn" onclick="setChartRange(5)">5</button>
                <button class="chart-btn" onclick="setChartRange(10)">10</button>
                <button class="chart-btn" onclick="setChartRange(20)">20</button>
                <button class="chart-btn active" onclick="setChartRange(0)">すべて</button>
            </div>
            <div style="height: calc(100% - 30px); width: 100%;">
                <canvas id="rateChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('sheetRecordsProV6') || '[]');
    let chartInstance = null;
    let chartRange = 0;

    const el = document.getElementById('entryBody');
    const sortable = Sortable.create(el, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: function () {
            const newOrder = [];
            const rows = el.querySelectorAll('tr');
            rows.forEach(row => {
                const id = parseInt(row.getAttribute('data-id'));
                const record = records.find(r => r.id === id);
                if (record) newOrder.push(record);
            });
            records = newOrder;
            save();
            render();
        }
    });

    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        render();
    }

    function calculateRate(r) {
        if (r.exclude) return 0;
        const rank = parseInt(r.rank) || 0;
        const total = parseInt(r.total) || 1;
        const score = parseFloat(r.score) || 0;
        const avg = parseFloat(r.avg) || 0;
        if (rank <= 0) return 0;
        const rankRatio = rank / total;
        let rate = 160 - (rankRatio * 100);
        const scaleBonus = 0.95 + (Math.log10(total) / 10);
        rate *= scaleBonus;
        if (avg > 0 && score > avg) {
            const scoreBonus = Math.min(5, (score / avg - 1) * 20);
            rate += scoreBonus;
        }
        return parseFloat(rate.toFixed(2));
    }

    function getRateColor(rate) {
        if (rate <= 0) return '#333';
        let minR = 75, maxR = 150;
        let percent = (rate - minR) / (maxR - minR);
        percent = Math.max(0, Math.min(1, percent));
        let hue = 120 * (1 - percent); 
        return `hsl(${hue}, 75%, 40%)`;
    }

    function getRankClass(rank) {
        if (rank === 1) return 'rank-gold';
        if (rank === 2) return 'rank-silver';
        if (rank === 3) return 'rank-bronze';
        return '';
    }

    function save() {
        localStorage.setItem('sheetRecordsProV6', JSON.stringify(records));
    }

    function addNewRow() {
        records.push({ id: Date.now(), comp: '', song: '', rank: '', total: '', score: '', avg: '', exclude: false });
        save();
        render();
    }

    function duplicateRow(id) {
        const index = records.findIndex(r => r.id === id);
        if (index !== -1) {
            const r = records[index];
            const newRow = {
                id: Date.now(),
                comp: r.comp,
                song: '',
                rank: '',
                total: r.total,
                score: '',
                avg: r.avg,
                exclude: false
            };
            records.splice(index + 1, 0, newRow);
            save();
            render();
        }
    }

    function updateField(id, field, value) {
        const index = records.findIndex(r => r.id === id);
        if (index !== -1) {
            records[index][field] = value;
            save();
            if (field === 'exclude') render();
        }
    }

    function deleteRow(id) {
        if(confirm("この行を削除しますか？")) {
            records = records.filter(r => r.id !== id);
            save();
            render();
        }
    }

    function setChartRange(range) {
        chartRange = range;
        const btns = document.querySelectorAll('.chart-btn');
        btns.forEach(btn => {
            const val = parseInt(btn.innerText);
            btn.classList.toggle('active', val === range || (btn.innerText === 'すべて' && range === 0));
        });
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('rateChart').getContext('2d');
        const validRates = records.filter(r => !r.exclude && parseInt(r.rank) > 0).map(r => ({
            label: r.song || 'Untitled',
            rate: calculateRate(r)
        }));
        let displayData = validRates;
        if (chartRange > 0) displayData = validRates.slice(-chartRange);
        if (chartInstance) chartInstance.destroy();
        const rates = displayData.map(d => d.rate);
        const minRate = rates.length ? Math.min(...rates) : 50;
        const maxRate = rates.length ? Math.max(...rates) : 200;
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: displayData.map(d => d.label),
                datasets: [{
                    data: rates,
                    borderColor: '#217346',
                    backgroundColor: 'rgba(33, 115, 70, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { suggestedMin: Math.floor(minRate - 10), suggestedMax: Math.ceil(maxRate + 10), ticks: { font: { size: 10 } } },
                    x: { ticks: { display: false } }
                },
                plugins: { legend: { display: false }, tooltip: { enabled: true } }
            }
        });
    }

    function render() {
        const entryBody = document.getElementById('entryBody');
        const resultBody = document.getElementById('resultBody');
        const top10Body = document.getElementById('top10Body');
        const showExcluded = document.getElementById('showExcludedCheck').checked;

        entryBody.innerHTML = "";
        resultBody.innerHTML = "";
        top10Body.innerHTML = "";

        const processed = records.map(r => ({ ...r, rate: calculateRate(r) }));
        const top10 = [...processed].filter(r => r.rate > 0 && !r.exclude).sort((a, b) => b.rate - a.rate).slice(0, 10);

        records.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', r.id);
            tr.innerHTML = `
                <td class="drag-handle">≡</td>
                <td style="text-align:center; color:#999;">${i + 1}</td>
                <td><input type="text" value="${r.comp}" oninput="updateField(${r.id}, 'comp', this.value)"></td>
                <td><input type="text" value="${r.song}" oninput="updateField(${r.id}, 'song', this.value)"></td>
                <td><input type="number" value="${r.rank}" oninput="updateField(${r.id}, 'rank', this.value)"></td>
                <td><input type="number" value="${r.total}" oninput="updateField(${r.id}, 'total', this.value)"></td>
                <td><input type="number" step="0.1" value="${r.score}" oninput="updateField(${r.id}, 'score', this.value)"></td>
                <td><input type="number" step="0.1" value="${r.avg}" oninput="updateField(${r.id}, 'avg', this.value)"></td>
                <td style="text-align:center;">
                    <input type="checkbox" ${r.exclude ? 'checked' : ''} onchange="updateField(${r.id}, 'exclude', this.checked)">
                    <button class="copy-btn" onclick="duplicateRow(${r.id})">複</button>
                    <button onclick="deleteRow(${r.id})" style="color:red; border:none; background:none; cursor:pointer;">×</button>
                </td>
            `;
            entryBody.appendChild(tr);
        });

        processed.forEach((r, i) => {
            if (!r.comp && !r.song) return;
            if (r.exclude && !showExcluded) return; // 非表示設定

            const rank = parseInt(r.rank) || 0;
            const total = parseInt(r.total) || 1;
            const topRatio = (rank / total) * 100;
            const isWinner = (rank === 1); 
            const rankClass = getRankClass(rank);
            
            const tr = document.createElement('tr');
            if (rank === 1) tr.className = "winner-row";
            if (r.exclude) tr.classList.add('excluded-row');

            tr.innerHTML = `
                <td style="text-align:center;">${i + 1}</td>
                <td>${r.comp}</td>
                <td>${r.song}</td>
                <td style="text-align:right;" class="${rankClass}">${rank}/${total}</td>
                <td style="text-align:right;">
                    <div class="score-display">
                        <span class="score-main">${(parseFloat(r.score) || 0).toFixed(1)}</span>
                        <span class="score-avg">avg: ${r.avg > 0 ? parseFloat(r.avg).toFixed(1) : '---'}</span>
                    </div>
                </td>
                <td style="text-align:right;">${topRatio.toFixed(1)}%</td>
                <td style="text-align:right; color: ${getRateColor(r.rate)}">
                    <div class="rate-cell-content">
                        ${isWinner ? '<span class="best-label">Best</span>' : ''}
                        <span class="rate-value">${r.rate > 0 ? r.rate.toFixed(2) : '---'}</span>
                    </div>
                </td>
            `;
            resultBody.appendChild(tr);
        });

        const validRecords = processed.filter(r => parseInt(r.rank) > 0 && !r.exclude);
        const count = validRecords.length;
        let avgOver = 0, t10c = 0, t3c = 0, rankSum = 0;
        
        validRecords.forEach(r => {
            if (parseFloat(r.score) > parseFloat(r.avg) && r.avg > 0) avgOver++;
            if (parseInt(r.rank) <= 10) t10c++; 
            if (parseInt(r.rank) <= 3) t3c++;
            rankSum += parseInt(r.rank);
        });

        const divisor = Math.min(count, 10);
        const totalRate = count > 0 ? (top10.reduce((s, x) => s + x.rate, 0) / divisor).toFixed(2) : "0.00";

        document.getElementById('dCount').innerText = count;
        document.getElementById('dTotalRate').innerText = totalRate;
        document.getElementById('dAvgOver').innerText = count ? ((avgOver/count)*100).toFixed(1) + "%" : "0%";
        document.getElementById('dTop10Rate').innerText = count ? ((t10c/count)*100).toFixed(1) + "%" : "0%";
        document.getElementById('dTop3Rate').innerText = count ? ((t3c/count)*100).toFixed(1) + "%" : "0%";
        document.getElementById('dAvgRank').innerText = count ? (rankSum/count).toFixed(1) : "0.0";

        top10.forEach((r, i) => {
            const rc = getRankClass(parseInt(r.rank));
            top10Body.innerHTML += `<tr><td style="text-align:center; font-weight:bold; color:#64748b;">${i+1}</td><td class="top10-song">${r.song}</td><td class="top10-stats ${rc}">${r.rank}/${r.total}</td><td class="top10-rate" style="color: ${getRateColor(r.rate)};">${r.rate.toFixed(2)}</td></tr>`;
        });
        
        if (document.getElementById('dashboard').classList.contains('active')) {
            renderChart();
        }
    }

    if (records.length === 0) addNewRow();
    render();
</script>

</body>
</html>
